<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>识野 · 简历体验版</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: light-dark(#f4f6f1, #0d120f);
      --surface: light-dark(#fffefa, #171d19);
      --surface-soft: light-dark(#edf3ec, #202822);
      --surface-strong: light-dark(#121b15, #f2f8ef);
      --ink: light-dark(#121b15, #eef5eb);
      --muted: light-dark(#59665b, #aab7ab);
      --line: light-dark(#d9e2d6, #303b33);
      --accent: light-dark(#5f8467, #a9d8ae);
      --accent-strong: light-dark(#385a40, #c7ecc9);
      --accent-soft: light-dark(#e4efe2, #203327);
      --danger: light-dark(#9f3434, #ffb3a9);
      --radius: 18px;
      --shadow: light-dark(0 22px 56px rgba(28, 38, 30, .12), 0 18px 44px rgba(0, 0, 0, .22));
      --shadow-soft: light-dark(0 10px 24px rgba(28, 38, 30, .08), 0 10px 24px rgba(0, 0, 0, .18));
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 8%, light-dark(rgba(107, 145, 114, .18), rgba(125, 180, 134, .10)), transparent 30%),
        radial-gradient(circle at 88% 18%, light-dark(rgba(186, 154, 93, .15), rgba(190, 170, 112, .08)), transparent 28%),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: background .18s ease, color .18s ease, transform .18s ease, opacity .18s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    button:focus-visible,
    input:focus-visible,
    .dropzone:focus-within {
      outline: 3px solid color-mix(in srgb, var(--accent) 38%, transparent);
      outline-offset: 3px;
    }

    .page {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 34px 0 64px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 52px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--surface-strong);
      color: var(--bg);
      font-size: 21px;
      font-weight: 800;
    }

    .brand-name {
      display: grid;
      gap: 2px;
    }

    .brand-name strong {
      font-size: 18px;
      line-height: 1.1;
    }

    .brand-name span {
      color: var(--muted);
      font-size: 13px;
    }

    .service-state {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 11px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      color: var(--muted);
      font-size: 13px;
      box-shadow: var(--shadow-soft);
      white-space: nowrap;
      backdrop-filter: blur(12px);
    }

    .service-state::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .service-state.is-waking::before {
      animation: pulse 1.1s ease-in-out infinite;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(360px, .92fr) minmax(430px, 1fr);
      gap: 64px;
      align-items: center;
    }

    .intro {
      padding: 10px 0 28px;
    }

    h1 {
      margin: 0 0 24px;
      max-width: 9ch;
      font-size: 72px;
      line-height: 1.04;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .intro p {
      max-width: 620px;
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.76;
      text-wrap: pretty;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 26px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 7px 12px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent-soft) 86%, transparent);
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 650;
    }

    .demo-shell {
      border-radius: 22px;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--surface) 96%, transparent), color-mix(in srgb, var(--surface) 90%, var(--surface-soft))),
        var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
    }

    .demo-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 24px 0;
    }

    .demo-title {
      display: grid;
      gap: 3px;
    }

    .demo-title strong {
      font-size: 18px;
      line-height: 1.25;
    }

    .demo-title span {
      color: var(--muted);
      font-size: 13px;
    }

    .reset-button {
      min-height: 34px;
      padding: 8px 13px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--ink);
      font-size: 13px;
      font-weight: 650;
    }

    .panel {
      padding: 20px 24px 24px;
    }

    .dropzone {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 264px;
      padding: 30px;
      border: 1px solid color-mix(in srgb, var(--accent) 42%, var(--line));
      border-radius: 20px;
      background:
        radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--accent-soft) 72%, transparent), transparent 50%),
        linear-gradient(180deg, color-mix(in srgb, var(--surface-soft) 88%, transparent), transparent),
        var(--surface-soft);
      text-align: center;
      transition: border-color .18s ease, background .18s ease, transform .18s ease, box-shadow .18s ease;
    }

    .dropzone.is-dragging {
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .dropzone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon {
      display: grid;
      place-items: center;
      width: 72px;
      height: 72px;
      margin: 0 auto 22px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, var(--surface), color-mix(in srgb, var(--surface-soft) 52%, var(--surface)));
      color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--line), var(--shadow-soft);
    }

    .upload-copy strong {
      display: block;
      margin-bottom: 10px;
      font-size: 24px;
      line-height: 1.2;
    }

    .upload-copy span {
      display: block;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.68;
    }

    .primary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 56px;
      margin-top: 16px;
      border-radius: 16px;
      background: var(--surface-strong);
      color: var(--bg);
      font-weight: 760;
      font-size: 16px;
    }

    .primary-button:not(:disabled):hover {
      background: color-mix(in srgb, var(--surface-strong) 92%, var(--accent));
    }

    .reset-button:not(:disabled):hover {
      background: color-mix(in srgb, var(--surface-soft) 78%, var(--accent-soft));
    }

    .primary-button:disabled,
    .reset-button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }

    .status-card,
    .result {
      margin-top: 16px;
      border-radius: 18px;
      background: var(--surface);
      box-shadow: inset 0 0 0 1px var(--line);
    }

    .status-card {
      display: none;
      padding: 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .status-card.is-visible {
      display: block;
    }

    .status-card.is-error {
      color: var(--danger);
    }

    .progress {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--surface-soft);
    }

    .bar span {
      display: block;
      width: 38%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width .25s ease;
    }

    .result {
      display: none;
      overflow: hidden;
    }

    .result.is-visible {
      display: block;
    }

    .artwork {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 4 / 3;
      background: var(--surface-soft);
      overflow: hidden;
    }

    .artwork img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .artwork-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--muted);
      text-align: center;
      background:
        linear-gradient(100deg, transparent 0 28%, color-mix(in srgb, var(--surface) 50%, transparent) 38%, transparent 48%),
        var(--surface-soft);
      background-size: 260% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .artwork-placeholder strong {
      display: block;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .result-body {
      padding: 22px;
    }

    .result-title {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .result-title h2 {
      margin: 0;
      font-size: 27px;
      line-height: 1.15;
      text-wrap: balance;
    }

    .confidence {
      flex: none;
      padding: 6px 9px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 700;
    }

    .latin {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 15px;
      font-style: italic;
    }

    .summary {
      margin: 0 0 18px;
      font-size: 16px;
      line-height: 1.7;
      text-wrap: pretty;
    }

    .facts {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .fact {
      padding: 13px 0 0;
      border-top: 1px solid color-mix(in srgb, var(--line) 82%, transparent);
    }

    .fact strong {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
      line-height: 1.35;
    }

    .fact p {
      margin: 0;
      color: var(--muted);
      line-height: 1.72;
      font-size: 15px;
    }

    .result-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .note {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      padding: 0 2px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid color-mix(in srgb, currentColor 22%, transparent);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .hidden {
      display: none !important;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes shimmer {
      0% { background-position: 120% 0; }
      100% { background-position: -120% 0; }
    }

    @keyframes pulse {
      0%, 100% { opacity: .35; }
      50% { opacity: 1; }
    }

    @media (max-width: 860px) {
      .page {
        width: min(100% - 24px, 640px);
        padding-top: 24px;
        padding-bottom: 42px;
      }

      .topbar {
        margin-bottom: 28px;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .intro {
        padding-top: 0;
      }

      h1 {
        max-width: none;
        font-size: 44px;
        line-height: 1.08;
      }

      .intro p {
        font-size: 16px;
      }

      .demo-head,
      .panel {
        padding-left: 18px;
        padding-right: 18px;
      }
    }

    @media (max-width: 520px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .service-state {
        white-space: normal;
      }

      .demo-head {
        align-items: stretch;
        flex-direction: column;
        gap: 12px;
      }

      .reset-button {
        width: 100%;
      }

      .dropzone {
        min-height: 236px;
        padding: 22px 18px;
      }

      .upload-icon {
        width: 62px;
        height: 62px;
        border-radius: 16px;
      }

      .upload-copy strong {
        font-size: 21px;
      }

      .result-title {
        flex-direction: column;
      }

      .result-body {
        padding: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar" aria-label="识野项目">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">识</div>
        <div class="brand-name">
          <strong>识野</strong>
          <span>认识 / 记录</span>
        </div>
      </div>
      <div id="serviceState" class="service-state is-waking">正在唤醒识别服务</div>
    </header>

    <section class="hero">
      <div class="intro">
        <h1>让好奇，识得万物。</h1>
        <p>上传动物的图片或视频，我会带你认识它。这个简历体验版先支持图片上传，会展示识别结果、轻科普内容，并继续绘制一张身份卡。</p>
        <div class="meta" aria-label="项目能力">
          <span class="tag">认识</span>
          <span class="tag">记录</span>
          <span class="tag">轻科普</span>
          <span class="tag">身份卡</span>
        </div>
      </div>

      <section class="demo-shell" aria-label="在线体验">
        <div class="demo-head">
          <div class="demo-title">
            <strong>在线体验</strong>
            <span>上传动物的图片，我会带你认识它</span>
          </div>
          <button id="resetButton" class="reset-button" type="button" disabled>重新上传</button>
        </div>

        <div class="panel">
          <label id="dropzone" class="dropzone" for="mediaInput">
            <input id="mediaInput" type="file" accept="image/*" />
            <span class="upload-copy">
              <span class="upload-icon" aria-hidden="true">
                <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
                  <path d="M4 17.5V6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5Z" stroke="currentColor" stroke-width="1.8"/>
                  <path d="m7.5 16 3.2-3.2a1.4 1.4 0 0 1 2 0L16.5 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M16.4 9.2h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                </svg>
              </span>
              <strong>上传图片或视频</strong>
              <span>上传动物的图片，我会带你认识它，并生成一张身份卡。</span>
            </span>
          </label>

          <button id="identifyButton" class="primary-button" type="button" disabled>
            <span>上传后自动识别</span>
          </button>

          <div id="statusCard" class="status-card" role="status" aria-live="polite"></div>

          <article id="result" class="result" aria-label="识别结果">
            <div class="artwork">
              <img id="artworkImage" class="hidden" alt="生成的手绘身份卡" />
              <div id="artworkPlaceholder" class="artwork-placeholder">
                <span>
                  <strong>正在绘制身份卡</strong>
                  识别结果已生成，身份卡会在完成后自动出现。
                </span>
              </div>
            </div>
            <div class="result-body">
              <div class="result-title">
                <h2 id="resultName">识别结果</h2>
                <span id="resultConfidence" class="confidence">判断中</span>
              </div>
              <p id="resultLatin" class="latin"></p>
              <p id="resultSummary" class="summary"></p>
              <ul id="facts" class="facts"></ul>
              <div id="resultTags" class="result-tags"></div>
            </div>
          </article>

          <p class="note">简历体验版会在浏览器本地压缩图片后上传。第一次访问可能需要等待识别服务唤醒。</p>
        </div>
      </section>
    </section>
  </main>

  <script>
    const API_BASE_URL = "https://shiye-app.onrender.com";
    const MAX_IMAGE_SIZE = 1400;
    const JPEG_QUALITY = 0.84;

    const mediaInput = document.getElementById("mediaInput");
    const identifyButton = document.getElementById("identifyButton");
    const resetButton = document.getElementById("resetButton");
    const dropzone = document.getElementById("dropzone");
    const serviceState = document.getElementById("serviceState");
    const statusCard = document.getElementById("statusCard");
    const result = document.getElementById("result");
    const artworkImage = document.getElementById("artworkImage");
    const artworkPlaceholder = document.getElementById("artworkPlaceholder");
    const resultName = document.getElementById("resultName");
    const resultConfidence = document.getElementById("resultConfidence");
    const resultLatin = document.getElementById("resultLatin");
    const resultSummary = document.getElementById("resultSummary");
    const facts = document.getElementById("facts");
    const resultTags = document.getElementById("resultTags");

    let selectedFile = null;
    let compressedFile = null;
    let busy = false;
    let statusTimer = null;
    let runId = 0;

    wakeServer();

    mediaInput.addEventListener("change", async () => {
      const file = mediaInput.files?.[0];
      if (!file) return;
      await prepareFile(file);
    });

    identifyButton.addEventListener("click", () => {
      if (busy || !compressedFile) return;
      identifySelectedImage();
    });

    resetButton.addEventListener("click", resetDemo);

    ["dragenter", "dragover"].forEach((eventName) => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.add("is-dragging");
      });
    });

    ["dragleave", "drop"].forEach((eventName) => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.remove("is-dragging");
      });
    });

    dropzone.addEventListener("drop", async (event) => {
      const file = event.dataTransfer?.files?.[0];
      if (!file) return;
      await prepareFile(file);
    });

    async function wakeServer() {
      try {
        const response = await fetch(`${API_BASE_URL}/health`, { cache: "no-store" });
        if (!response.ok) throw new Error("health check failed");
        serviceState.textContent = "识别服务已就绪";
        serviceState.classList.remove("is-waking");
      } catch {
        serviceState.textContent = "服务正在唤醒，首次可能较慢";
      }
    }

    async function prepareFile(file) {
      clearError();

      if (!file.type.startsWith("image/")) {
        showError("简历体验版目前先支持图片。请上传一张动物图片。");
        return;
      }

      busy = true;
      selectedFile = file;
      setButtonLoading("正在压缩图片");
      showStatus(`已选择：${file.name}。正在准备图片。`, 16);

      try {
        compressedFile = await compressImage(file);
        identifyButton.disabled = true;
        identifyButton.innerHTML = "<span>正在识别</span>";
        resetButton.disabled = false;
        showStatus(`图片已准备好：${formatBytes(compressedFile.size)}。即将开始识别。`, 24);
        await identifySelectedImage();
      } catch (error) {
        selectedFile = null;
        compressedFile = null;
        showError(error.message || "图片读取失败，请换一张图片试试。");
      } finally {
        busy = false;
      }
    }

    async function identifySelectedImage() {
      busy = true;
      const currentRunId = ++runId;
      identifyButton.disabled = true;
      resetButton.disabled = true;
      setButtonLoading("正在识别");
      hideResult();
      showStatus("正在识别。第一次访问可能需要等待识别服务唤醒。", 38);
      startStatusLoop([
        "正在识别。第一次访问可能需要等待识别服务唤醒。",
        "还在识别中。图片会先判断主体，再生成科普内容。",
        "识别服务仍在处理。请先停留在这个页面。"
      ], 38);

      try {
        const identifyResult = await callIdentify(compressedFile);
        stopStatusLoop();
        renderResult(identifyResult);
        showStatus("识别结果已生成，身份卡正在后台绘制。", 68);
        identifyButton.disabled = false;
        identifyButton.innerHTML = "<span>重新识别</span>";
        resetButton.disabled = false;
        generateArtwork(identifyResult, compressedFile, currentRunId);
      } catch (error) {
        stopStatusLoop();
        showError(error.message || "识别失败，请稍后再试。");
        identifyButton.disabled = false;
        identifyButton.innerHTML = "<span>重新识别</span>";
        resetButton.disabled = false;
      } finally {
        busy = false;
      }
    }

    async function callIdentify(file) {
      const form = new FormData();
      form.append("media", file, file.name);
      form.append("mediaKind", "image");
      form.append("observedAt", new Date().toISOString());

      const response = await fetchWithTimeout(`${API_BASE_URL}/api/identify`, {
        method: "POST",
        body: form
      }, 75000, "识别时间太长了，请换一张更清楚、文件更小的图片再试。");

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || "识别服务返回失败。");
      }
      return data;
    }

    async function generateArtwork(identifyResult, file, currentRunId) {
      try {
        const form = new FormData();
        form.append("media", file, file.name);
        form.append("name", identifyResult.name || "");
        form.append("latin", identifyResult.latin || "");
        form.append("summary", identifyResult.summary || "");
        form.append("tags", JSON.stringify(identifyResult.tags || []));

        startStatusLoop([
          "身份卡正在后台绘制。你可以先阅读识别结果。",
          "身份卡还在绘制中。图片生成通常会比文字识别更慢。",
          "还在绘制身份卡。如果失败，识别结果会继续保留。"
        ], 72);

        const response = await fetchWithTimeout(`${API_BASE_URL}/api/artwork`, {
          method: "POST",
          body: form
        }, 125000, "身份卡生成时间太长了。识别结果已保留，可以稍后重新上传再试。");
        const data = await response.json().catch(() => ({}));
        if (currentRunId !== runId) return;
        if (!response.ok || !data.artworkBase64) {
          throw new Error(data.error || "身份卡生成失败。");
        }
        artworkImage.src = `data:image/jpeg;base64,${data.artworkBase64}`;
        artworkImage.classList.remove("hidden");
        artworkPlaceholder.classList.add("hidden");
        stopStatusLoop();
        showStatus("身份卡已生成。", 100);
      } catch (error) {
        if (currentRunId !== runId) return;
        stopStatusLoop();
        artworkPlaceholder.innerHTML = "<span><strong>身份卡暂时没有生成</strong>识别内容可以先查看，稍后可重新上传再试。</span>";
        showError(error.message || "身份卡生成失败。识别结果已保留。");
      } finally {
        identifyButton.disabled = false;
        identifyButton.innerHTML = "<span>重新识别</span>";
        resetButton.disabled = false;
      }
    }

    async function fetchWithTimeout(url, options, timeoutMs, timeoutMessage) {
      const controller = new AbortController();
      const timeout = window.setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } catch (error) {
        if (error.name === "AbortError") throw new Error(timeoutMessage);
        throw error;
      } finally {
        window.clearTimeout(timeout);
      }
    }

    function startStatusLoop(messages, progress) {
      stopStatusLoop();
      let index = 0;
      statusTimer = window.setInterval(() => {
        index = Math.min(index + 1, messages.length - 1);
        showStatus(messages[index], Math.min(progress + index * 8, 92));
      }, 12000);
    }

    function stopStatusLoop() {
      if (!statusTimer) return;
      window.clearInterval(statusTimer);
      statusTimer = null;
    }

    function renderResult(data) {
      resultName.textContent = data.name || "识别结果待确认";
      resultConfidence.textContent = data.confidence || "不确定";
      resultLatin.textContent = data.latin || "分类待确认";
      resultSummary.textContent = data.summary || "这张图片的信息还不够明确。";
      facts.replaceChildren(...(data.facts || []).map((item) => {
        const li = document.createElement("li");
        li.className = "fact";
        const title = document.createElement("strong");
        title.textContent = item.title || "观察提示";
        const text = document.createElement("p");
        text.textContent = item.text || "";
        li.append(title, text);
        return li;
      }));
      resultTags.replaceChildren(...(data.tags || []).map((tag) => {
        const item = document.createElement("span");
        item.className = "tag";
        item.textContent = tag;
        return item;
      }));
      artworkImage.classList.add("hidden");
      artworkImage.removeAttribute("src");
      artworkPlaceholder.classList.remove("hidden");
      artworkPlaceholder.innerHTML = "<span><strong>正在绘制身份卡</strong>识别结果已生成，身份卡会在完成后自动出现。</span>";
      result.classList.add("is-visible");
    }

    function hideResult() {
      result.classList.remove("is-visible");
    }

    function resetDemo() {
      runId += 1;
      stopStatusLoop();
      selectedFile = null;
      compressedFile = null;
      mediaInput.value = "";
      hideResult();
      statusCard.className = "status-card";
      statusCard.textContent = "";
      identifyButton.disabled = true;
      identifyButton.innerHTML = "<span>上传后自动识别</span>";
      resetButton.disabled = true;
    }

    function showStatus(message, progress) {
      statusCard.className = "status-card is-visible";
      statusCard.innerHTML = `
        <div>${escapeHTML(message)}</div>
        <div class="progress" aria-hidden="true">
          <div class="progress-row"><span>处理进度</span><span>${Math.min(progress, 100)}%</span></div>
          <div class="bar"><span style="width:${Math.min(progress, 100)}%"></span></div>
        </div>
      `;
    }

    function showError(message) {
      statusCard.className = "status-card is-visible is-error";
      statusCard.textContent = message;
    }

    function clearError() {
      statusCard.classList.remove("is-error");
    }

    function setButtonLoading(label) {
      identifyButton.innerHTML = `<span class="spinner" aria-hidden="true"></span><span>${escapeHTML(label)}</span>`;
    }

    async function compressImage(file) {
      const bitmap = await createImageBitmap(file);
      const scale = Math.min(1, MAX_IMAGE_SIZE / Math.max(bitmap.width, bitmap.height));
      const width = Math.max(1, Math.round(bitmap.width * scale));
      const height = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const context = canvas.getContext("2d");
      context.drawImage(bitmap, 0, 0, width, height);
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/jpeg", JPEG_QUALITY));
      bitmap.close?.();
      if (!blob) throw new Error("图片压缩失败，请换一张图片试试。");
      return new File([blob], file.name.replace(/\.[^.]+$/, "") + "-compressed.jpg", {
        type: "image/jpeg",
        lastModified: Date.now()
      });
    }

    function formatBytes(bytes) {
      if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }
  </script>
</body>
