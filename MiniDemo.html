<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>识野 · html 体验版 demo</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: light-dark(#f4f6f1, #0d120f);
      --surface: light-dark(#fffefa, #171d19);
      --surface-soft: light-dark(#edf3ec, #202822);
      --surface-strong: light-dark(#121b15, #f2f8ef);
      --ink: light-dark(#121b15, #eef5eb);
      --muted: light-dark(#59665b, #aab7ab);
      --line: light-dark(#d9e2d6, #303b33);
      --accent: light-dark(#5f8467, #a9d8ae);
      --accent-strong: light-dark(#385a40, #c7ecc9);
      --accent-soft: light-dark(#e4efe2, #203327);
      --danger: light-dark(#9f3434, #ffb3a9);
      --radius: 18px;
      --shadow: light-dark(0 22px 56px rgba(28, 38, 30, .12), 0 18px 44px rgba(0, 0, 0, .22));
      --shadow-soft: light-dark(0 10px 24px rgba(28, 38, 30, .08), 0 10px 24px rgba(0, 0, 0, .18));
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 8%, light-dark(rgba(107, 145, 114, .18), rgba(125, 180, 134, .10)), transparent 30%),
        radial-gradient(circle at 88% 18%, light-dark(rgba(186, 154, 93, .15), rgba(190, 170, 112, .08)), transparent 28%),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: background .18s ease, color .18s ease, transform .18s ease, opacity .18s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    button:focus-visible,
    input:focus-visible,
    .dropzone:focus-within {
      outline: 3px solid color-mix(in srgb, var(--accent) 38%, transparent);
      outline-offset: 3px;
    }

    .page {
      width: min(1040px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 64px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 30px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--surface-strong);
      color: var(--bg);
      font-size: 21px;
      font-weight: 800;
    }

    .brand-name {
      display: grid;
      gap: 2px;
    }

    .brand-name strong {
      font-size: 24px;
      line-height: 1.1;
    }

    .brand-en {
      color: #ff5757;
      font-size: 20px;
      font-weight: 750;
      line-height: 1;
    }

    .service-state {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 11px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      color: var(--muted);
      font-size: 13px;
      box-shadow: var(--shadow-soft);
      white-space: nowrap;
      backdrop-filter: blur(12px);
    }

    .service-state::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .service-state.is-waking::before {
      animation: pulse 1.1s ease-in-out infinite;
    }

    .hero {
      display: grid;
      gap: 24px;
    }

    .intro {
      display: grid;
      justify-items: center;
      padding: 4px 0 16px;
      text-align: center;
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(44px, 6.2vw, 72px);
      line-height: 1.08;
      letter-spacing: 0;
      white-space: nowrap;
      text-wrap: balance;
    }

    h1 span {
      display: inline;
    }

    .intro-copy {
      display: grid;
      gap: 8px;
      width: min(900px, 100%);
    }

    .intro-copy p {
      max-width: none;
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.68;
      text-wrap: pretty;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 22px;
    }

    .tabs {
      display: inline-flex;
      justify-self: center;
      gap: 6px;
      padding: 6px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface) 82%, transparent);
      border: 1px solid color-mix(in srgb, var(--line) 76%, transparent);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
    }

    .tab-button {
      min-width: 118px;
      min-height: 42px;
      padding: 10px 18px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      font-weight: 760;
    }

    .tab-button.is-active {
      background: var(--surface-strong);
      color: var(--bg);
      box-shadow: var(--shadow-soft);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.is-active {
      display: block;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 7px 12px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent-soft) 86%, transparent);
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 650;
    }

    .demo-shell {
      position: relative;
      width: min(760px, 100%);
      margin: 0 auto;
      border-radius: 22px;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--surface) 96%, transparent), color-mix(in srgb, var(--surface) 90%, var(--surface-soft))),
        var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
    }

    .demo-head {
      position: absolute;
      top: 22px;
      right: 24px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .reset-button {
      min-height: 34px;
      padding: 8px 13px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--ink);
      font-size: 13px;
      font-weight: 650;
    }

    .panel {
      padding: 24px;
    }

    .dropzone {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 166px;
      padding: 22px 24px;
      border: 1px solid color-mix(in srgb, var(--accent) 42%, var(--line));
      border-radius: 20px;
      background:
        radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--accent-soft) 72%, transparent), transparent 50%),
        linear-gradient(180deg, color-mix(in srgb, var(--surface-soft) 88%, transparent), transparent),
        var(--surface-soft);
      text-align: center;
      transition: border-color .18s ease, background .18s ease, transform .18s ease, box-shadow .18s ease;
    }

    .dropzone.is-dragging {
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .dropzone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon {
      display: grid;
      place-items: center;
      width: 94px;
      height: 94px;
      margin: 0 auto 12px;
      border-radius: 24px;
      overflow: hidden;
      background: transparent;
      box-shadow: var(--shadow-soft);
    }

    .upload-icon img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .upload-copy strong {
      display: block;
      color: var(--ink);
      font-size: 22px;
      line-height: 1.38;
    }

    .reset-button:not(:disabled):hover {
      background: color-mix(in srgb, var(--surface-soft) 78%, var(--accent-soft));
    }

    .reset-button:disabled {
      display: none;
    }

    .status-card,
    .result {
      margin-top: 16px;
      border-radius: 18px;
      background: var(--surface);
      box-shadow: inset 0 0 0 1px var(--line);
    }

    .status-card {
      display: none;
      padding: 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .status-card.is-visible {
      display: block;
    }

    .status-card.is-error {
      color: var(--danger);
    }

    .progress {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--surface-soft);
    }

    .bar span {
      display: block;
      width: 38%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width .25s ease;
    }

    .result {
      display: none;
      overflow: hidden;
    }

    .result.is-visible {
      display: block;
    }

    .artwork {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 4 / 3;
      background: var(--surface-soft);
      overflow: hidden;
    }

    .artwork img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .artwork-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--muted);
      text-align: center;
      background:
        linear-gradient(100deg, transparent 0 28%, color-mix(in srgb, var(--surface) 50%, transparent) 38%, transparent 48%),
        var(--surface-soft);
      background-size: 260% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .artwork-placeholder strong {
      display: block;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .result-body {
      padding: 22px;
    }

    .result-title {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .result-title h2 {
      margin: 0;
      font-size: 27px;
      line-height: 1.15;
      text-wrap: balance;
    }

    .confidence {
      flex: none;
      padding: 6px 9px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 700;
    }

    .latin {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 15px;
      font-style: italic;
    }

    .summary {
      margin: 0 0 18px;
      font-size: 16px;
      line-height: 1.7;
      text-wrap: pretty;
    }

    .facts {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .fact {
      padding: 13px 0 0;
      border-top: 1px solid color-mix(in srgb, var(--line) 82%, transparent);
    }

    .fact strong {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
      line-height: 1.35;
    }

    .fact p {
      margin: 0;
      color: var(--muted);
      line-height: 1.72;
      font-size: 15px;
    }

    .result-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .save-button {
      width: 100%;
      min-height: 54px;
      margin-top: 18px;
      border-radius: 16px;
      background: var(--surface-strong);
      color: var(--bg);
      font-size: 16px;
      font-weight: 760;
    }

    .save-button:disabled {
      cursor: default;
      opacity: .78;
    }

    .saved-note {
      display: none;
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 14px;
      font-weight: 650;
    }

    .saved-note.is-visible {
      display: block;
    }

    .records {
      display: none;
      width: 100%;
      margin-top: 0;
      padding: 22px;
      border-radius: 22px;
      background: var(--surface);
      box-shadow: var(--shadow);
      border: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
    }

    .records.is-visible {
      display: block;
    }

    .records h2 {
      margin: 0 0 14px;
      font-size: 28px;
      line-height: 1.25;
    }

    .record-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .record-card {
      min-width: 0;
      padding: 10px;
      border-radius: 16px;
      background: var(--surface-soft);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--line) 82%, transparent);
      transition: box-shadow .18s ease, transform .18s ease;
    }

    .record-card.is-new {
      box-shadow: inset 0 0 0 2px var(--accent), var(--shadow-soft);
      transform: translateY(-1px);
    }

    .record-art {
      display: grid;
      place-items: center;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border-radius: 12px;
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
    }

    .record-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .record-name {
      margin-top: 10px;
      font-size: 16px;
      font-weight: 780;
      line-height: 1.25;
    }

    .record-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .empty-records {
      grid-column: 1 / -1;
      padding: 38px 18px;
      border-radius: 18px;
      background: var(--surface-soft);
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid color-mix(in srgb, currentColor 22%, transparent);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .hidden {
      display: none !important;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes shimmer {
      0% { background-position: 120% 0; }
      100% { background-position: -120% 0; }
    }

    @keyframes pulse {
      0%, 100% { opacity: .35; }
      50% { opacity: 1; }
    }

    @media (max-width: 860px) {
      .page {
        width: min(100% - 24px, 640px);
        padding-top: 24px;
        padding-bottom: 42px;
      }

      .topbar {
        margin-bottom: 24px;
      }

      .intro {
        padding-top: 0;
      }

      h1 {
        max-width: none;
        font-size: clamp(38px, 10vw, 48px);
        line-height: 1.1;
      }

      .intro-copy p {
        font-size: 16px;
      }

      .demo-head,
      .panel {
        padding-left: 18px;
        padding-right: 18px;
      }

      .demo-head {
        right: 18px;
      }

      .record-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .service-state {
        white-space: normal;
      }

      .tabs {
        width: 100%;
      }

      .tab-button {
        flex: 1;
        min-width: 0;
      }

      .reset-button {
        min-height: 32px;
        padding-inline: 12px;
      }

      .dropzone {
        min-height: 142px;
        padding: 22px 18px;
      }

      .upload-icon {
        width: 76px;
        height: 76px;
      }

      .result-title {
        flex-direction: column;
      }

      .result-body {
        padding: 18px;
      }

      .record-grid {
        gap: 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar" aria-label="识野项目">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">识</div>
        <div class="brand-name">
          <strong>识野</strong>
        </div>
        <div class="brand-en" aria-hidden="true">WildSight</div>
      </div>
      <div id="serviceState" class="service-state is-waking">正在唤醒识别服务</div>
    </header>

    <section class="hero">
      <div class="intro">
        <h1 aria-label="让好奇识得万物"><span aria-hidden="true">让好奇</span><span aria-hidden="true">识得万物</span></h1>
        <div class="intro-copy">
          <p>希望通过有趣的科普内容和可爱的身份卡，让你对和这个地球上每一个生命的相遇都充满好奇。</p>
          <p>当前版本暂不支持对保存的身份卡进行分类，别急这个模块已经在构思中啦～</p>
        </div>
        <div class="meta" aria-label="项目能力">
          <span class="tag">动物</span>
          <span class="tag">轻科普</span>
          <span class="tag">记录</span>
        </div>
      </div>

      <nav class="tabs" aria-label="识野 demo">
        <button id="recognizeTab" class="tab-button is-active" type="button">认识</button>
        <button id="recordsTab" class="tab-button" type="button">记录</button>
      </nav>

      <section id="recognizePanel" class="tab-panel is-active" aria-label="认识">
        <section class="demo-shell" aria-label="在线体验">
          <div class="demo-head">
            <button id="resetButton" class="reset-button" type="button" disabled>重新上传</button>
          </div>

          <div class="panel">
            <label id="dropzone" class="dropzone" for="mediaInput">
              <input id="mediaInput" type="file" accept="image/*,video/*" />
              <span class="upload-copy">
                <span class="upload-icon" aria-hidden="true">
                  <img src="assets/wildsight-upload-icon.png" alt="" />
                </span>
                <strong>上传动物的图片或视频，我会带你认识它。</strong>
              </span>
            </label>

            <div id="statusCard" class="status-card" role="status" aria-live="polite"></div>

            <article id="result" class="result" aria-label="识别结果">
              <div class="artwork">
                <img id="artworkImage" class="hidden" alt="生成的手绘身份卡" />
                <div id="artworkPlaceholder" class="artwork-placeholder">
                  <span>
                    <strong>正在绘制身份卡</strong>
                    识别结果已生成，身份卡会在完成后自动出现。
                  </span>
                </div>
              </div>
              <div class="result-body">
                <div class="result-title">
                  <h2 id="resultName">识别结果</h2>
                  <span id="resultConfidence" class="confidence">判断中</span>
                </div>
                <p id="resultLatin" class="latin"></p>
                <p id="resultSummary" class="summary"></p>
                <ul id="facts" class="facts"></ul>
                <div id="resultTags" class="result-tags"></div>
                <button id="saveButton" class="save-button" type="button">保存这张身份卡</button>
                <div id="savedNote" class="saved-note">已在「记录」中保存了你认识的新朋友。</div>
              </div>
            </article>
          </div>
        </section>
      </section>

      <section id="recordsPanel" class="tab-panel" aria-label="记录">
        <section id="records" class="records" aria-label="记录">
          <h2>每次遇见都会记录在此</h2>
          <div id="recordGrid" class="record-grid"></div>
        </section>
      </section>
    </section>
  </main>

  <script>
    const API_BASE_URL = "https://shiye-app.onrender.com";
    const MAX_IMAGE_SIZE = 1400;
    const JPEG_QUALITY = 0.84;

    const mediaInput = document.getElementById("mediaInput");
    const resetButton = document.getElementById("resetButton");
    const dropzone = document.getElementById("dropzone");
    const serviceState = document.getElementById("serviceState");
    const statusCard = document.getElementById("statusCard");
    const result = document.getElementById("result");
    const artworkImage = document.getElementById("artworkImage");
    const artworkPlaceholder = document.getElementById("artworkPlaceholder");
    const resultName = document.getElementById("resultName");
    const resultConfidence = document.getElementById("resultConfidence");
    const resultLatin = document.getElementById("resultLatin");
    const resultSummary = document.getElementById("resultSummary");
    const facts = document.getElementById("facts");
    const resultTags = document.getElementById("resultTags");
    const saveButton = document.getElementById("saveButton");
    const savedNote = document.getElementById("savedNote");
    const records = document.getElementById("records");
    const recordGrid = document.getElementById("recordGrid");
    const recognizeTab = document.getElementById("recognizeTab");
    const recordsTab = document.getElementById("recordsTab");
    const recognizePanel = document.getElementById("recognizePanel");
    const recordsPanel = document.getElementById("recordsPanel");

    let selectedFile = null;
    let compressedFile = null;
    let latestResult = null;
    let savedLatestId = "";
    let savedRecords = loadSavedRecords();
    let busy = false;
    let statusTimer = null;
    let runId = 0;

    renderRecords();
    wakeServer();

    mediaInput.addEventListener("change", async () => {
      const file = mediaInput.files?.[0];
      if (!file) return;
      await prepareFile(file);
    });

    resetButton.addEventListener("click", resetDemo);
    saveButton.addEventListener("click", saveCurrentCard);
    recognizeTab.addEventListener("click", () => switchTab("recognize"));
    recordsTab.addEventListener("click", () => switchTab("records"));

    ["dragenter", "dragover"].forEach((eventName) => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.add("is-dragging");
      });
    });

    ["dragleave", "drop"].forEach((eventName) => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.remove("is-dragging");
      });
    });

    dropzone.addEventListener("drop", async (event) => {
      const file = event.dataTransfer?.files?.[0];
      if (!file) return;
      await prepareFile(file);
    });

    async function wakeServer() {
      try {
        const response = await fetch(`${API_BASE_URL}/health`, { cache: "no-store" });
        if (!response.ok) throw new Error("health check failed");
        serviceState.textContent = "识别服务已就绪";
        serviceState.classList.remove("is-waking");
      } catch {
        serviceState.textContent = "识别服务唤醒中";
      }
    }

    async function prepareFile(file) {
      clearError();

      if (!file.type.startsWith("image/") && !file.type.startsWith("video/")) {
        showError("请上传动物的图片或视频。");
        return;
      }

      busy = true;
      selectedFile = file;
      const isVideo = file.type.startsWith("video/");
      showStatus(isVideo ? "正在从视频里截取画面。" : "正在准备图片。", 16);

      try {
        compressedFile = isVideo ? await frameFromVideo(file) : await compressImage(file);
        resetButton.disabled = false;
        showStatus("开始识别。", 24);
        await identifySelectedImage();
      } catch (error) {
        selectedFile = null;
        compressedFile = null;
        showError(error.message || "图片读取失败，请换一张图片试试。");
      } finally {
        busy = false;
      }
    }

    async function identifySelectedImage() {
      busy = true;
      const currentRunId = ++runId;
      resetButton.disabled = true;
      hideResult();
      showStatus("正在识别。", 38);
      startStatusLoop([
        "正在识别。",
        "正在生成轻科普内容。",
        "快好了。"
      ], 38);

      try {
        const identifyResult = await callIdentify(compressedFile);
        stopStatusLoop();
        renderResult(identifyResult);
        showStatus("识别完成，正在绘制身份卡。", 68);
        resetButton.disabled = false;
        generateArtwork(identifyResult, compressedFile, currentRunId);
      } catch (error) {
        stopStatusLoop();
        showError(error.message || "识别失败，请稍后再试。");
        resetButton.disabled = false;
      } finally {
        busy = false;
      }
    }

    async function callIdentify(file) {
      const form = new FormData();
      form.append("media", file, file.name);
      form.append("mediaKind", "image");
      form.append("observedAt", new Date().toISOString());

      const response = await fetchWithTimeout(`${API_BASE_URL}/api/identify`, {
        method: "POST",
        body: form
      }, 75000, "识别时间太长了，请换一张更清楚、文件更小的图片再试。");

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || "识别服务返回失败。");
      }
      return data;
    }

    async function generateArtwork(identifyResult, file, currentRunId) {
      try {
        const form = new FormData();
        form.append("media", file, file.name);
        form.append("name", identifyResult.name || "");
        form.append("latin", identifyResult.latin || "");
        form.append("summary", identifyResult.summary || "");
        form.append("tags", JSON.stringify(identifyResult.tags || []));

        startStatusLoop([
          "正在绘制身份卡。",
          "身份卡还在生成。",
          "快好了。"
        ], 72);

        const response = await fetchWithTimeout(`${API_BASE_URL}/api/artwork`, {
          method: "POST",
          body: form
        }, 125000, "身份卡生成时间太长了。识别结果已保留，可以稍后重新上传再试。");
        const data = await response.json().catch(() => ({}));
        if (currentRunId !== runId) return;
        if (!response.ok || !data.artworkBase64) {
          throw new Error(data.error || "身份卡生成失败。");
        }
        artworkImage.src = `data:image/jpeg;base64,${data.artworkBase64}`;
        artworkImage.classList.remove("hidden");
        artworkPlaceholder.classList.add("hidden");
        updateSavedArtwork(artworkImage.src);
        stopStatusLoop();
        showStatus("身份卡已生成。", 100);
      } catch (error) {
        if (currentRunId !== runId) return;
        stopStatusLoop();
        artworkPlaceholder.innerHTML = "<span><strong>身份卡暂时没有生成</strong>识别内容可以先查看。</span>";
        showError(error.message || "身份卡生成失败。识别结果已保留。");
      } finally {
        resetButton.disabled = false;
      }
    }

    async function fetchWithTimeout(url, options, timeoutMs, timeoutMessage) {
      const controller = new AbortController();
      const timeout = window.setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } catch (error) {
        if (error.name === "AbortError") throw new Error(timeoutMessage);
        throw error;
      } finally {
        window.clearTimeout(timeout);
      }
    }

    function startStatusLoop(messages, progress) {
      stopStatusLoop();
      let index = 0;
      statusTimer = window.setInterval(() => {
        index = Math.min(index + 1, messages.length - 1);
        showStatus(messages[index], Math.min(progress + index * 8, 92));
      }, 12000);
    }

    function stopStatusLoop() {
      if (!statusTimer) return;
      window.clearInterval(statusTimer);
      statusTimer = null;
    }

    function renderResult(data) {
      resultName.textContent = data.name || "识别结果待确认";
      resultConfidence.textContent = normalizeConfidence(data.confidence);
      resultLatin.textContent = data.latin || "分类待确认";
      resultSummary.textContent = data.summary || "这张图片的信息还不够明确。";
      facts.replaceChildren(...(data.facts || []).map((item) => {
        const li = document.createElement("li");
        li.className = "fact";
        const title = document.createElement("strong");
        title.textContent = item.title || "观察提示";
        const text = document.createElement("p");
        text.textContent = item.text || "";
        li.append(title, text);
        return li;
      }));
      resultTags.replaceChildren(...(data.tags || []).map((tag) => {
        const item = document.createElement("span");
        item.className = "tag";
        item.textContent = tag;
        return item;
      }));
      artworkImage.classList.add("hidden");
      artworkImage.removeAttribute("src");
      artworkPlaceholder.classList.remove("hidden");
      artworkPlaceholder.innerHTML = "<span><strong>正在绘制身份卡</strong>识别结果已生成，身份卡会在完成后自动出现。</span>";
      latestResult = data;
      saveButton.disabled = false;
      saveButton.textContent = "保存这张身份卡";
      savedNote.classList.remove("is-visible");
      result.classList.add("is-visible");
    }

    function hideResult() {
      result.classList.remove("is-visible");
    }

    function resetDemo() {
      runId += 1;
      stopStatusLoop();
      selectedFile = null;
      compressedFile = null;
      latestResult = null;
      savedLatestId = "";
      mediaInput.value = "";
      hideResult();
      statusCard.className = "status-card";
      statusCard.textContent = "";
      resetButton.disabled = true;
    }

    function saveCurrentCard() {
      if (!latestResult) return;
      const record = {
        id: `${Date.now()}`,
        name: latestResult.name || "识别结果待确认",
        latin: latestResult.latin || "分类待确认",
        tags: latestResult.tags || [],
        artwork: artworkImage.src || "",
        createdAt: new Date().toISOString()
      };
      savedRecords = [record, ...savedRecords].slice(0, 8);
      savedLatestId = record.id;
      localStorage.setItem("wildsight-mini-records", JSON.stringify(savedRecords));
      saveButton.textContent = "身份卡已保存";
      saveButton.disabled = true;
      savedNote.classList.add("is-visible");
      showStatus("身份卡已保存。", 100);
      renderRecords(record.id);
      switchTab("records");
    }

    function updateSavedArtwork(src) {
      if (!savedLatestId || !src) return;
      const index = savedRecords.findIndex((record) => record.id === savedLatestId);
      if (index < 0) return;
      savedRecords[index] = { ...savedRecords[index], artwork: src };
      localStorage.setItem("wildsight-mini-records", JSON.stringify(savedRecords));
      renderRecords(savedLatestId);
    }

    function normalizeConfidence(value) {
      const text = String(value || "").trim();
      if (text.includes("一定") || text.includes("准确") || text.includes("明确") || text.toLowerCase() === "high") {
        return "一定是";
      }
      if (text.includes("可能") || text.includes("模糊") || text.includes("一般") || text.toLowerCase() === "medium") {
        return "可能是";
      }
      return "不确定";
    }

    function loadSavedRecords() {
      try {
        return JSON.parse(localStorage.getItem("wildsight-mini-records") || "[]");
      } catch {
        return [];
      }
    }

    function renderRecords(highlightId = "") {
      records.classList.add("is-visible");
      if (!savedRecords.length) {
        const empty = document.createElement("div");
        empty.className = "empty-records";
        empty.textContent = "保存后的身份卡会出现在这里。";
        recordGrid.replaceChildren(empty);
        return;
      }
      recordGrid.replaceChildren(...savedRecords.map((record) => {
        const card = document.createElement("article");
        card.className = `record-card${record.id === highlightId ? " is-new" : ""}`;
        const art = document.createElement("div");
        art.className = "record-art";
        if (record.artwork) {
          const img = document.createElement("img");
          img.src = record.artwork;
          img.alt = `${record.name}身份卡`;
          art.append(img);
        } else {
          art.textContent = "身份卡";
        }
        const name = document.createElement("div");
        name.className = "record-name";
        name.textContent = record.name;
        const meta = document.createElement("div");
        meta.className = "record-meta";
        meta.textContent = (record.tags || []).slice(0, 2).join(" · ") || "待补充";
        card.append(art, name, meta);
        return card;
      }));
    }

    function switchTab(tab) {
      const showRecords = tab === "records";
      recognizeTab.classList.toggle("is-active", !showRecords);
      recordsTab.classList.toggle("is-active", showRecords);
      recognizePanel.classList.toggle("is-active", !showRecords);
      recordsPanel.classList.toggle("is-active", showRecords);
      recognizeTab.setAttribute("aria-selected", String(!showRecords));
      recordsTab.setAttribute("aria-selected", String(showRecords));
      if (showRecords) {
        renderRecords(savedLatestId);
      }
    }

    function showStatus(message, progress) {
      statusCard.className = "status-card is-visible";
      statusCard.innerHTML = `
        <div>${escapeHTML(message)}</div>
        <div class="progress" aria-hidden="true">
          <div class="progress-row"><span>进度</span><span>${Math.min(progress, 100)}%</span></div>
          <div class="bar"><span style="width:${Math.min(progress, 100)}%"></span></div>
        </div>
      `;
    }

    function showError(message) {
      statusCard.className = "status-card is-visible is-error";
      statusCard.textContent = message;
    }

    function clearError() {
      statusCard.classList.remove("is-error");
    }

    async function compressImage(file) {
      const bitmap = await createImageBitmap(file);
      const scale = Math.min(1, MAX_IMAGE_SIZE / Math.max(bitmap.width, bitmap.height));
      const width = Math.max(1, Math.round(bitmap.width * scale));
      const height = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const context = canvas.getContext("2d");
      context.drawImage(bitmap, 0, 0, width, height);
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/jpeg", JPEG_QUALITY));
      bitmap.close?.();
      if (!blob) throw new Error("图片压缩失败，请换一张图片试试。");
      return new File([blob], file.name.replace(/\.[^.]+$/, "") + "-compressed.jpg", {
        type: "image/jpeg",
        lastModified: Date.now()
      });
    }

    async function frameFromVideo(file) {
      const url = URL.createObjectURL(file);
      try {
        const video = document.createElement("video");
        video.preload = "metadata";
        video.muted = true;
        video.playsInline = true;
        video.src = url;

        await new Promise((resolve, reject) => {
          video.onloadedmetadata = resolve;
          video.onerror = () => reject(new Error("视频读取失败，请换一段更清楚的视频。"));
        });

        const duration = Number.isFinite(video.duration) ? video.duration : 0;
        video.currentTime = Math.min(Math.max(duration * 0.5, 0.1), Math.max(duration - 0.1, 0.1));
        await new Promise((resolve, reject) => {
          video.onseeked = resolve;
          video.onerror = () => reject(new Error("视频截帧失败，请换一段更清楚的视频。"));
        });

        const scale = Math.min(1, MAX_IMAGE_SIZE / Math.max(video.videoWidth, video.videoHeight));
        const width = Math.max(1, Math.round(video.videoWidth * scale));
        const height = Math.max(1, Math.round(video.videoHeight * scale));
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const context = canvas.getContext("2d");
        context.drawImage(video, 0, 0, width, height);
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/jpeg", JPEG_QUALITY));
        if (!blob) throw new Error("视频截帧失败，请换一段更清楚的视频。");
        return new File([blob], file.name.replace(/\.[^.]+$/, "") + "-frame.jpg", {
          type: "image/jpeg",
          lastModified: Date.now()
        });
      } finally {
        URL.revokeObjectURL(url);
      }
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }
  </script>
