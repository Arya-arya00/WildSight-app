<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>识野 · html 体验版 demo</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: light-dark(#f4f6f1, #0d120f);
      --surface: light-dark(#fffefa, #171d19);
      --surface-soft: light-dark(#edf3ec, #202822);
      --surface-strong: light-dark(#121b15, #f2f8ef);
      --ink: light-dark(#121b15, #eef5eb);
      --muted: light-dark(#59665b, #aab7ab);
      --line: light-dark(#d9e2d6, #303b33);
      --accent: light-dark(#5f8467, #a9d8ae);
      --accent-strong: light-dark(#385a40, #c7ecc9);
      --accent-soft: light-dark(#e4efe2, #203327);
      --danger: light-dark(#9f3434, #ffb3a9);
      --radius: 18px;
      --shadow: light-dark(0 22px 56px rgba(28, 38, 30, .12), 0 18px 44px rgba(0, 0, 0, .22));
      --shadow-soft: light-dark(0 10px 24px rgba(28, 38, 30, .08), 0 10px 24px rgba(0, 0, 0, .18));
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 8%, light-dark(rgba(107, 145, 114, .18), rgba(125, 180, 134, .10)), transparent 30%),
        radial-gradient(circle at 88% 18%, light-dark(rgba(186, 154, 93, .15), rgba(190, 170, 112, .08)), transparent 28%),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: background .18s ease, color .18s ease, transform .18s ease, opacity .18s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    button:focus-visible,
    input:focus-visible,
    .dropzone:focus-within {
      outline: 3px solid color-mix(in srgb, var(--accent) 38%, transparent);
      outline-offset: 3px;
    }

    .page {
      width: min(1040px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 64px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 30px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--surface-strong);
      color: var(--bg);
      font-size: 21px;
      font-weight: 800;
    }

    .brand-name {
      display: grid;
      gap: 2px;
    }

    .brand-name strong {
      font-size: 24px;
      line-height: 1.1;
    }

    .brand-en {
      color: #ff5757;
      font-size: 20px;
      font-weight: 750;
      line-height: 1;
    }

    .service-state {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 11px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      color: var(--muted);
      font-size: 13px;
      box-shadow: var(--shadow-soft);
      white-space: nowrap;
      backdrop-filter: blur(12px);
    }

    .service-state::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .service-state.is-waking::before {
      animation: pulse 1.1s ease-in-out infinite;
    }

    .hero {
      display: grid;
      gap: 24px;
    }

    .intro {
      display: grid;
      justify-items: center;
      padding: 4px 0 16px;
      text-align: center;
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(44px, 6.2vw, 72px);
      line-height: 1.08;
      letter-spacing: 0;
      white-space: nowrap;
      text-wrap: balance;
    }

    h1 span {
      display: inline;
    }

    .intro-copy {
      display: grid;
      gap: 8px;
      width: min(900px, 100%);
    }

    .intro-copy p {
      max-width: none;
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.68;
      text-wrap: pretty;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 22px;
    }

    .tabs {
      display: inline-flex;
      justify-self: center;
      gap: 6px;
      padding: 6px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface) 82%, transparent);
      border: 1px solid color-mix(in srgb, var(--line) 76%, transparent);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
    }

    .tab-button {
      min-width: 118px;
      min-height: 42px;
      padding: 10px 18px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      font-weight: 760;
    }

    .tab-button.is-active {
      background: var(--surface-strong);
      color: var(--bg);
      box-shadow: var(--shadow-soft);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.is-active {
      display: block;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 7px 12px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent-soft) 86%, transparent);
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 650;
    }

    .demo-shell {
      position: relative;
      width: min(760px, 100%);
      margin: 0 auto;
      border-radius: 22px;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--surface) 96%, transparent), color-mix(in srgb, var(--surface) 90%, var(--surface-soft))),
        var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
    }

    .demo-head {
      position: absolute;
      top: 22px;
      right: 24px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .reset-button {
      min-height: 34px;
      padding: 8px 13px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--ink);
      font-size: 13px;
      font-weight: 650;
    }

    .panel {
      padding: 24px;
    }

    .dropzone {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 166px;
      padding: 22px 24px;
      border: 1px solid color-mix(in srgb, var(--accent) 42%, var(--line));
      border-radius: 20px;
      background:
        radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--accent-soft) 72%, transparent), transparent 50%),
        linear-gradient(180deg, color-mix(in srgb, var(--surface-soft) 88%, transparent), transparent),
        var(--surface-soft);
      text-align: center;
      transition: border-color .18s ease, background .18s ease, transform .18s ease, box-shadow .18s ease;
    }

    .dropzone.is-dragging {
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .dropzone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .media-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .upload-icon {
      display: grid;
      place-items: center;
      position: relative;
      width: 70px;
      height: 70px;
      margin: 0 auto 12px;
      border-radius: 22px;
      overflow: hidden;
      background:
        linear-gradient(180deg, var(--surface), color-mix(in srgb, var(--surface-soft) 60%, var(--surface)));
      box-shadow: inset 0 0 0 1px var(--line), var(--shadow-soft);
    }

    .upload-icon::before,
    .upload-icon::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28px;
      height: 4px;
      border-radius: 999px;
      background: var(--accent-strong);
      transform: translate(-50%, -50%);
    }

    .upload-icon::after {
      transform: translate(-50%, -50%) rotate(90deg);
    }

    .upload-copy strong {
      display: block;
      color: var(--ink);
      font-size: 22px;
      line-height: 1.38;
    }

    .upload-menu {
      position: fixed;
      z-index: 20;
      display: grid;
      gap: 6px;
      padding: 8px;
      border-radius: 18px;
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      border: 1px solid color-mix(in srgb, var(--line) 78%, transparent);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .upload-menu[hidden] {
      display: none;
    }

    .upload-menu button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 46px;
      padding: 10px 14px;
      border-radius: 13px;
      background: transparent;
      color: var(--ink);
      font-size: 15px;
      font-weight: 760;
      text-align: left;
    }

    .upload-menu button:hover {
      background: var(--surface-soft);
    }

    .reset-button:not(:disabled):hover {
      background: color-mix(in srgb, var(--surface-soft) 78%, var(--accent-soft));
    }

    .reset-button:disabled {
      display: none;
    }

    .status-card,
    .result {
      margin-top: 16px;
      border-radius: 18px;
      background: var(--surface);
      box-shadow: inset 0 0 0 1px var(--line);
    }

    .status-card {
      display: none;
      padding: 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .status-card.is-visible {
      display: block;
    }

    .status-card.is-error {
      color: var(--danger);
    }

    .progress {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--surface-soft);
    }

    .bar span {
      display: block;
      width: 38%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width .25s ease;
    }

    .result {
      display: none;
      overflow: hidden;
    }

    .result.is-visible {
      display: block;
    }

    .artwork {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 4 / 3;
      background: var(--surface-soft);
      overflow: hidden;
    }

    .artwork img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .artwork-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--muted);
      text-align: center;
      background:
        linear-gradient(100deg, transparent 0 28%, color-mix(in srgb, var(--surface) 50%, transparent) 38%, transparent 48%),
        var(--surface-soft);
      background-size: 260% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .artwork-placeholder strong {
      display: block;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .result-body {
      padding: 22px;
    }

    .result-title {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .result-title h2 {
      margin: 0;
      font-size: 27px;
      line-height: 1.15;
      text-wrap: balance;
    }

    .confidence {
      flex: none;
      padding: 6px 9px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 700;
    }

    .latin {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 15px;
      font-style: italic;
    }

    .summary {
      margin: 0 0 18px;
      font-size: 16px;
      line-height: 1.7;
      text-wrap: pretty;
    }

    .facts {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .fact {
      padding: 13px 0 0;
      border-top: 1px solid color-mix(in srgb, var(--line) 82%, transparent);
    }

    .fact strong {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
      line-height: 1.35;
    }

    .fact p {
      margin: 0;
      color: var(--muted);
      line-height: 1.72;
      font-size: 15px;
    }

    .result-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .save-button {
      width: 100%;
      min-height: 54px;
      margin-top: 18px;
      border-radius: 16px;
      background: var(--surface-strong);
      color: var(--bg);
      font-size: 16px;
      font-weight: 760;
    }

    .save-button:disabled {
      cursor: default;
      opacity: .78;
    }

    .saved-note {
      display: none;
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 14px;
      font-weight: 650;
    }

    .saved-note.is-visible {
      display: block;
    }

    .records {
      display: none;
      width: 100%;
      margin-top: 0;
      padding: 22px;
      border-radius: 22px;
      background: var(--surface);
      box-shadow: var(--shadow);
      border: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
    }

    .records.is-visible {
      display: block;
    }

    .records h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.25;
    }

    .records-note {
      margin: 8px 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .record-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .record-card {
      display: block;
      width: 100%;
      text-align: left;
      min-width: 0;
      padding: 10px;
      border-radius: 16px;
      background: var(--surface-soft);
      color: var(--ink);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--line) 82%, transparent);
      transition: box-shadow .18s ease, transform .18s ease;
    }

    .record-card:hover {
      box-shadow: inset 0 0 0 1px var(--accent), var(--shadow-soft);
      transform: translateY(-1px);
    }

    .record-card.is-new {
      box-shadow: inset 0 0 0 2px var(--accent), var(--shadow-soft);
      transform: translateY(-1px);
    }

    .record-art {
      display: grid;
      place-items: center;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border-radius: 12px;
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
    }

    .record-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .record-name {
      margin-top: 10px;
      font-size: 16px;
      font-weight: 780;
      line-height: 1.25;
    }

    .record-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .empty-records {
      grid-column: 1 / -1;
      padding: 38px 18px;
      border-radius: 18px;
      background: var(--surface-soft);
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .record-menu {
      position: fixed;
      z-index: 30;
      min-width: 150px;
      padding: 8px;
      border-radius: 16px;
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      border: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .record-menu[hidden] {
      display: none;
    }

    .menu-danger {
      width: 100%;
      min-height: 42px;
      border-radius: 12px;
      background: transparent;
      color: var(--danger);
      font-size: 15px;
      font-weight: 760;
    }

    .menu-danger:hover {
      background: color-mix(in srgb, var(--danger) 12%, transparent);
    }

    .detail-modal[hidden] {
      display: none;
    }

    .detail-modal {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      padding: 24px;
      background: color-mix(in srgb, var(--bg) 72%, transparent);
      backdrop-filter: blur(18px);
    }

    .detail-sheet {
      width: min(720px, 100%);
      max-height: min(820px, calc(100vh - 48px));
      overflow: auto;
      border-radius: 24px;
      background: var(--surface);
      border: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
      box-shadow: var(--shadow);
    }

    .detail-media {
      aspect-ratio: 4 / 3;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: var(--surface-soft);
      color: var(--muted);
    }

    .detail-media img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .detail-body {
      padding: 22px;
    }

    .detail-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
    }

    .detail-head h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.18;
    }

    .detail-close {
      flex: none;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--ink);
      font-size: 22px;
      line-height: 1;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid color-mix(in srgb, currentColor 22%, transparent);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .hidden {
      display: none !important;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes shimmer {
      0% { background-position: 120% 0; }
      100% { background-position: -120% 0; }
    }

    @keyframes pulse {
      0%, 100% { opacity: .35; }
      50% { opacity: 1; }
    }

    @media (max-width: 860px) {
      .page {
        width: min(100% - 24px, 640px);
        padding-top: 24px;
        padding-bottom: 42px;
      }

      .topbar {
        margin-bottom: 24px;
      }

      .intro {
        padding-top: 0;
      }

      h1 {
        max-width: none;
        font-size: clamp(38px, 10vw, 48px);
        line-height: 1.1;
      }

      .intro-copy p {
        font-size: 16px;
      }

      .demo-head,
      .panel {
        padding-left: 18px;
        padding-right: 18px;
      }

      .demo-head {
        right: 18px;
      }

      .record-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .service-state {
        white-space: normal;
      }

      .tabs {
        width: 100%;
      }

      .tab-button {
        flex: 1;
        min-width: 0;
      }

      .reset-button {
        min-height: 32px;
        padding-inline: 12px;
      }

      .dropzone {
        min-height: 142px;
        padding: 22px 18px;
      }

      .upload-icon {
        width: 64px;
        height: 64px;
      }

      .result-title {
        flex-direction: column;
      }

      .result-body {
        padding: 18px;
      }

      .record-grid {
        gap: 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar" aria-label="识野项目">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">识</div>
        <div class="brand-name">
          <strong>识野</strong>
        </div>
        <div class="brand-en" aria-hidden="true">WildSight</div>
      </div>
      <div id="serviceState" class="service-state is-waking">正在唤醒识别服务</div>
    </header>

    <section class="hero">
      <div class="intro">
        <h1 aria-label="让好奇识得万物"><span aria-hidden="true">让好奇</span><span aria-hidden="true">识得万物</span></h1>
        <div class="intro-copy">
          <p>希望通过有趣的科普内容，让你对地球上的每一次生命的相遇，都充满好奇…</p>
        </div>
        <div class="meta" aria-label="项目能力">
          <span class="tag">动物</span>
          <span class="tag">轻科普</span>
          <span class="tag">记录</span>
        </div>
      </div>

      <nav class="tabs" aria-label="识野 demo">
        <button id="recognizeTab" class="tab-button is-active" type="button">认识</button>
        <button id="recordsTab" class="tab-button" type="button">记录</button>
      </nav>

      <section id="recognizePanel" class="tab-panel is-active" aria-label="认识">
        <section class="demo-shell" aria-label="在线体验">
          <div class="demo-head">
            <button id="resetButton" class="reset-button" type="button" disabled>重新上传</button>

    const recordsPanel = document.getElementById("recordsPanel");

    let selectedFile = null;

    let savedLatestId = "";
    let activeMenuRecordId = "";
    let savedRecords = loadSavedRecords();

    renderRecords();
    wakeServer();

    mediaInput.addEventListener("change", async () => {
      const file = mediaInput.files?.[0];
      if (!file) return;
      await prepareFile(file);
    });

    dropzone.addEventListener("click", () => toggleUploadMenu());
    dropzone.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      event.preventDefault();
      toggleUploadMenu();
    });
    uploadMenu.addEventListener("click", (event) => event.stopPropagation());
    chooseMediaButton.addEventListener("click", () => {
      closeUploadMenu();
      mediaInput.value = "";
      mediaInput.click();
    });

    resetButton.addEventListener("click", resetDemo);
    saveButton.addEventListener("click", saveCurrentCard);

    recordsTab.addEventListener("click", () => switchTab("records"));
    deleteRecordButton.addEventListener("click", deleteActiveRecord);
    detailClose.addEventListener("click", closeRecordDetail);
    recordDetail.addEventListener("click", (event) => {
      if (event.target === recordDetail) closeRecordDetail();
    });
    document.addEventListener("click", (event) => {
      if (!uploadMenu.hidden && !dropzone.contains(event.target)) {
        closeUploadMenu();
      }
      if (!recordMenu.hidden && !recordMenu.contains(event.target)) {
        closeRecordMenu();
      }
    });
    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      closeUploadMenu();
      closeRecordMenu();
      closeRecordDetail();
    });

    ["dragenter", "dragover"].forEach((eventName) => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.add("is-dragging");
      });
    });

    ["dragleave", "drop"].forEach((eventName) => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.remove("is-dragging");
      });
    });

    dropzone.addEventListener("drop", async (event) => {
      const file = event.dataTransfer?.files?.[0];
      if (!file) return;
      closeUploadMenu();
      await prepareFile(file);
    });

    function toggleUploadMenu() {
      if (busy) return;
      const willOpen = uploadMenu.hidden;
      uploadMenu.hidden = !willOpen;
      if (willOpen) positionUploadMenu();
      dropzone.setAttribute("aria-expanded", String(!uploadMenu.hidden));
    }

    function closeUploadMenu() {
      uploadMenu.hidden = true;
      dropzone.setAttribute("aria-expanded", "false");
    }

    function positionUploadMenu() {
      const rect = dropzone.getBoundingClientRect();
      const width = Math.min(280, Math.max(220, rect.width - 40));
      const left = rect.left + rect.width / 2 - width / 2;
      const top = rect.bottom - 18;
      uploadMenu.style.width = `${width}px`;
      uploadMenu.style.left = `${Math.max(12, Math.min(left, window.innerWidth - width - 12))}px`;
      uploadMenu.style.top = `${Math.max(12, Math.min(top, window.innerHeight - 120))}px`;
    }

    async function useSampleImage(event) {
      event.stopPropagation();
      closeUploadMenu();
      try {
        const file = await loadSampleImageFile();
        await prepareFile(file);
      } catch (error) {
        showError(error.message || "示例图片读取失败。");
      }
    }

    async function loadSampleImageFile() {
      let blob = null;
      try {
        const response = await fetch(SAMPLE_IMAGE_URL);
        if (!response.ok) throw new Error("fetch failed");
        blob = await response.blob();
      } catch {
        const response = await fetch(SAMPLE_IMAGE_DATA_URL);
        blob = await response.blob();
      }
      if (!blob) throw new Error("示例图片读取失败。");
      return new File([blob], "sample-turtle.jpg", { type: blob.type || "image/jpeg" });
    }

    async function wakeServer() {
      try {
        const response = await fetch(`${API_BASE_URL}/health`, { cache: "no-store" });
        if (!response.ok) throw new Error("health check failed");
        serviceState.textContent = "识别服务已就绪";
        serviceState.classList.remove("is-waking");
      } catch {
        serviceState.textContent = "识别服务唤醒中";
      }
    }

    async function prepareFile(file) {
      clearError();

      if (!file.type.startsWith("image/") && !file.type.startsWith("video/")) {
        showError("请上传动物的图片或视频。");
        return;
      }

      busy = true;
      selectedFile = file;
      const isVideo = file.type.startsWith("video/");
      showStatus(isVideo ? "正在从视频里截取画面，模型可能有点慢，请耐心等待。" : "正在准备图片，模型可能有点慢，请耐心等待。", 16);

      try {
        compressedFile = isVideo ? await frameFromVideo(file) : await compressImage(file);
        resetButton.disabled = false;
        showStatus("开始识别，模型可能有点慢，请耐心等待。", 24);
        await identifySelectedImage();
      } catch (error) {
        selectedFile = null;
        compressedFile = null;
        showError(error.message || "图片读取失败，请换一张图片试试。");
      } finally {
        busy = false;
      }
    }

    async function identifySelectedImage() {
      busy = true;
      const currentRunId = ++runId;
      resetButton.disabled = true;
      hideResult();
      showStatus("正在识别，模型可能有点慢，请耐心等待。", 38);
      startStatusLoop([
        "正在识别，模型可能有点慢，请耐心等待。",
        "正在生成轻科普内容，模型可能有点慢，请耐心等待。",
        "快好了，请再等一下。"
      ], 38);

      try {
        const identifyResult = await callIdentify(compressedFile);
        stopStatusLoop();
        renderResult(identifyResult);
        showStatus("识别完成，正在绘制身份卡。", 68);
        resetButton.disabled = false;
        generateArtwork(identifyResult, compressedFile, currentRunId);
      } catch (error) {
        stopStatusLoop();
        showError(error.message || "识别失败，请稍后再试。");
        resetButton.disabled = false;
      } finally {
        busy = false;
      }
    }

    async function callIdentify(file) {
      const form = new FormData();
      form.append("media", file, file.name);
      form.append("mediaKind", "image");
      form.append("observedAt", new Date().toISOString());

      const response = await fetchWithTimeout(`${API_BASE_URL}/api/identify`, {
        method: "POST",
        body: form
      }, 75000, "识别时间太长了，请换一张更清楚、文件更小的图片再试。");

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || "识别服务返回失败。");
      }
      return data;
    }

    async function generateArtwork(identifyResult, file, currentRunId) {
      try {
        const form = new FormData();
        form.append("media", file, file.name);
        form.append("name", identifyResult.name || "");
        form.append("latin", identifyResult.latin || "");
        form.append("summary", identifyResult.summary || "");
        form.append("tags", JSON.stringify(identifyResult.tags || []));

        startStatusLoop([
          "正在绘制身份卡。",
          "身份卡还在生成。",
          "快好了。"
        ], 72);

        const response = await fetchWithTimeout(`${API_BASE_URL}/api/artwork`, {
          method: "POST",
          body: form
        }, 125000, "身份卡生成时间太长了。识别结果已保留，可以稍后重新上传再试。");
        const data = await response.json().catch(() => ({}));
        if (currentRunId !== runId) return;
        if (!response.ok || !data.artworkBase64) {
          throw new Error(data.error || "身份卡生成失败。");
        }
        artworkImage.src = `data:image/jpeg;base64,${data.artworkBase64}`;
        artworkImage.classList.remove("hidden");
        artworkPlaceholder.classList.add("hidden");
        updateSavedArtwork(artworkImage.src);
        stopStatusLoop();
        showStatus("身份卡已生成。", 100);
      } catch (error) {
        if (currentRunId !== runId) return;
        stopStatusLoop();
        artworkPlaceholder.innerHTML = "<span><strong>身份卡暂时没有生成</strong>识别内容可以先查看。</span>";
        showError(error.message || "身份卡生成失败。识别结果已保留。");
      } finally {
        resetButton.disabled = false;
      }
    }

    async function fetchWithTimeout(url, options, timeoutMs, timeoutMessage) {
      const controller = new AbortController();
      const timeout = window.setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } catch (error) {
        if (error.name === "AbortError") throw new Error(timeoutMessage);
        throw error;
      } finally {
        window.clearTimeout(timeout);
      }
    }

    function startStatusLoop(messages, progress) {
      stopStatusLoop();
      let index = 0;
      statusTimer = window.setInterval(() => {
        index = Math.min(index + 1, messages.length - 1);
        showStatus(messages[index], Math.min(progress + index * 8, 92));
      }, 12000);
    }

    function stopStatusLoop() {
      if (!statusTimer) return;
      window.clearInterval(statusTimer);
      statusTimer = null;
    }

    function renderResult(data) {
      resultName.textContent = data.name || "识别结果待确认";
      resultConfidence.textContent = normalizeConfidence(data.confidence);
      resultLatin.textContent = data.latin || "分类待确认";
      resultSummary.textContent = data.summary || "这张图片的信息还不够明确。";
      facts.replaceChildren(...(data.facts || []).map((item) => {
        const li = document.createElement("li");
        li.className = "fact";
        const title = document.createElement("strong");
        title.textContent = item.title || "观察提示";
        const text = document.createElement("p");
        text.textContent = item.text || "";
        li.append(title, text);
        return li;
      }));
      resultTags.replaceChildren(...(data.tags || []).map((tag) => {
        const item = document.createElement("span");
        item.className = "tag";
        item.textContent = tag;
        return item;
      }));
      artworkImage.classList.add("hidden");
      artworkImage.removeAttribute("src");
      artworkPlaceholder.classList.remove("hidden");
      artworkPlaceholder.innerHTML = "<span><strong>正在绘制身份卡</strong>识别结果已生成，身份卡会在完成后自动出现。</span>";
      latestResult = data;
      saveButton.disabled = false;
      saveButton.textContent = "保存这张身份卡";
      savedNote.classList.remove("is-visible");
      result.classList.add("is-visible");
    }

    function hideResult() {
      result.classList.remove("is-visible");
    }

    function resetDemo() {
      runId += 1;
      stopStatusLoop();
      selectedFile = null;
      compressedFile = null;
      latestResult = null;
      savedLatestId = "";
      mediaInput.value = "";
      hideResult();
      statusCard.className = "status-card";
      statusCard.textContent = "";
      resetButton.disabled = true;
    }

    function saveCurrentCard() {
      if (!latestResult) return;
      const record = {
        id: `${Date.now()}`,
        name: latestResult.name || "识别结果待确认",
        latin: latestResult.latin || "分类待确认",
        confidence: normalizeConfidence(latestResult.confidence),
        summary: latestResult.summary || "",
        facts: latestResult.facts || [],
        tags: latestResult.tags || [],
        artwork: artworkImage.src || "",
        createdAt: new Date().toISOString()
      };
      savedRecords = [record, ...savedRecords].slice(0, 8);
      savedLatestId = record.id;
      localStorage.setItem("wildsight-mini-records", JSON.stringify(savedRecords));
      saveButton.textContent = "身份卡已保存";
      saveButton.disabled = true;
      savedNote.classList.add("is-visible");
      showStatus("身份卡已保存。", 100);
      renderRecords(record.id);
      switchTab("records");
    }

    function updateSavedArtwork(src) {
      if (!savedLatestId || !src) return;
      const index = savedRecords.findIndex((record) => record.id === savedLatestId);
      if (index < 0) return;
      savedRecords[index] = { ...savedRecords[index], artwork: src };
      localStorage.setItem("wildsight-mini-records", JSON.stringify(savedRecords));
      renderRecords(savedLatestId);
    }

    function normalizeConfidence(value) {
      const text = String(value || "").trim();
      if (text.includes("一定") || text.includes("准确") || text.includes("明确") || text.toLowerCase() === "high") {
        return "一定是";
      }
      if (text.includes("可能") || text.includes("模糊") || text.includes("一般") || text.toLowerCase() === "medium") {
        return "可能是";
      }
      return "不确定";
    }

    function loadSavedRecords() {
      try {
        return JSON.parse(localStorage.getItem("wildsight-mini-records") || "[]");
      } catch {
        return [];
      }
    }

    function renderRecords(highlightId = "") {
      records.classList.add("is-visible");
      if (!savedRecords.length) {
        const empty = document.createElement("div");
        empty.className = "empty-records";
        empty.textContent = "暂时没有记录，快去上传照片认识新朋友吧～";
        recordGrid.replaceChildren(empty);
        return;
      }
      recordGrid.replaceChildren(...savedRecords.map((record) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = `record-card${record.id === highlightId ? " is-new" : ""}`;
        card.addEventListener("click", () => openRecordDetail(record.id));
        card.addEventListener("contextmenu", (event) => openRecordMenu(event, record.id));
        const art = document.createElement("div");
        art.className = "record-art";
        if (record.artwork) {
          const img = document.createElement("img");
          img.src = record.artwork;
          img.alt = `${record.name}身份卡`;
          art.append(img);
        } else {
          art.textContent = "身份卡";
        }
        const name = document.createElement("div");
        name.className = "record-name";
        name.textContent = record.name;
        const meta = document.createElement("div");
        meta.className = "record-meta";
        meta.textContent = (record.tags || []).slice(0, 2).join(" · ") || "待补充";
        card.append(art, name, meta);
        return card;
      }));
    }

    function openRecordMenu(event, recordId) {
      event.preventDefault();
      activeMenuRecordId = recordId;
      const menuWidth = 170;
      const menuHeight = 58;
      const left = Math.min(event.clientX, window.innerWidth - menuWidth - 12);
      const top = Math.min(event.clientY, window.innerHeight - menuHeight - 12);
      recordMenu.style.left = `${Math.max(12, left)}px`;
      recordMenu.style.top = `${Math.max(12, top)}px`;
      recordMenu.hidden = false;
    }

    function closeRecordMenu() {
      recordMenu.hidden = true;
      activeMenuRecordId = "";
    }

    function deleteActiveRecord() {
      if (!activeMenuRecordId) return;
      savedRecords = savedRecords.filter((record) => record.id !== activeMenuRecordId);
      if (savedLatestId === activeMenuRecordId) savedLatestId = "";
      localStorage.setItem("wildsight-mini-records", JSON.stringify(savedRecords));
      closeRecordMenu();
      closeRecordDetail();
      renderRecords();
    }

    function openRecordDetail(recordId) {
      closeRecordMenu();
      const record = savedRecords.find((item) => item.id === recordId);
      if (!record) return;
      detailName.textContent = record.name || "识别结果待确认";
      detailLatin.textContent = record.latin || "分类待确认";
      detailConfidence.textContent = normalizeConfidence(record.confidence);
      detailSummary.textContent = record.summary || "这条记录的详细科普信息较少，可以重新识别后保存。";
      detailMedia.replaceChildren();
      if (record.artwork) {
        const image = document.createElement("img");
        image.src = record.artwork;
        image.alt = `${record.name || "身份卡"}详情图`;
        detailMedia.append(image);
      } else {
        detailMedia.textContent = "身份卡";
      }
      detailFacts.replaceChildren(...(record.facts || []).map((item) => {
        const li = document.createElement("li");
        li.className = "fact";
        const title = document.createElement("strong");
        title.textContent = item.title || "观察提示";
        const text = document.createElement("p");
        text.textContent = item.text || "";
        li.append(title, text);
        return li;
      }));
      detailTags.replaceChildren(...(record.tags || []).map((tag) => {
        const item = document.createElement("span");
        item.className = "tag";
        item.textContent = tag;
        return item;
      }));
      recordDetail.hidden = false;
    }

    function closeRecordDetail() {
      recordDetail.hidden = true;
    }

    function switchTab(tab) {
      const showRecords = tab === "records";
      recognizeTab.classList.toggle("is-active", !showRecords);
      recordsTab.classList.toggle("is-active", showRecords);
      recognizePanel.classList.toggle("is-active", !showRecords);
      recordsPanel.classList.toggle("is-active", showRecords);
      recognizeTab.setAttribute("aria-selected", String(!showRecords));
      recordsTab.setAttribute("aria-selected", String(showRecords));
      if (showRecords) {
        renderRecords(savedLatestId);
      }
    }

    function showStatus(message, progress) {
      statusCard.className = "status-card is-visible";
      statusCard.innerHTML = `
        <div>${escapeHTML(message)}</div>
        <div class="progress" aria-hidden="true">
          <div class="progress-row"><span>进度</span><span>${Math.min(progress, 100)}%</span></div>
          <div class="bar"><span style="width:${Math.min(progress, 100)}%"></span></div>
        </div>
      `;
    }

    function showError(message) {
      statusCard.className = "status-card is-visible is-error";
      statusCard.textContent = message;
    }

    function clearError() {
      statusCard.classList.remove("is-error");
    }

    async function compressImage(file) {
      const bitmap = await createImageBitmap(file);
      const scale = Math.min(1, MAX_IMAGE_SIZE / Math.max(bitmap.width, bitmap.height));
      const width = Math.max(1, Math.round(bitmap.width * scale));
      const height = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const context = canvas.getContext("2d");
      context.drawImage(bitmap, 0, 0, width, height);
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/jpeg", JPEG_QUALITY));
      bitmap.close?.();
      if (!blob) throw new Error("图片压缩失败，请换一张图片试试。");
      return new File([blob], file.name.replace(/\.[^.]+$/, "") + "-compressed.jpg", {
        type: "image/jpeg",
        lastModified: Date.now()
      });
    }

    async function frameFromVideo(file) {
      const url = URL.createObjectURL(file);
      try {
        const video = document.createElement("video");
        video.preload = "metadata";
        video.muted = true;
        video.playsInline = true;
        video.src = url;

        await new Promise((resolve, reject) => {
          video.onloadedmetadata = resolve;
          video.onerror = () => reject(new Error("视频读取失败，请换一段更清楚的视频。"));
        });

        const duration = Number.isFinite(video.duration) ? video.duration : 0;
        video.currentTime = Math.min(Math.max(duration * 0.5, 0.1), Math.max(duration - 0.1, 0.1));
        await new Promise((resolve, reject) => {
          video.onseeked = resolve;
          video.onerror = () => reject(new Error("视频截帧失败，请换一段更清楚的视频。"));
        });

        const scale = Math.min(1, MAX_IMAGE_SIZE / Math.max(video.videoWidth, video.videoHeight));
        const width = Math.max(1, Math.round(video.videoWidth * scale));
        const height = Math.max(1, Math.round(video.videoHeight * scale));
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const context = canvas.getContext("2d");
        context.drawImage(video, 0, 0, width, height);
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/jpeg", JPEG_QUALITY));
        if (!blob) throw new Error("视频截帧失败，请换一段更清楚的视频。");
        return new File([blob], file.name.replace(/\.[^.]+$/, "") + "-frame.jpg", {
          type: "image/jpeg",
          lastModified: Date.now()
        });
      } finally {
        URL.revokeObjectURL(url);
      }
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }
  </script>
